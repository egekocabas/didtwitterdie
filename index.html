<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#ffffff" />
    <script>
      (function () {
        var saved = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var isDark = saved === "dark" || (!saved && prefersDark);
        if (isDark) {
          document.documentElement.classList.add("dark");
          document.documentElement.style.backgroundColor = "#030712";
          document.querySelector('meta[name="theme-color"]').content = "#030712";
        }
      })();
    </script>
    <title>Did Twitter Die?</title>
    <meta name="description" content="Real data comparing twitter.com vs x.com popularity — DNS queries, search interest, and domain rankings since the July 2023 rebrand." />
    <link rel="canonical" href="https://didtwitterdie.com/" />

    <!-- Structured data -->
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Did Twitter Die?",
        "url": "https://didtwitterdie.com/",
        "description": "Real data comparing twitter.com vs x.com popularity — DNS queries, search interest, and domain rankings since the July 2023 rebrand."
      },
      {
        "@context": "https://schema.org",
        "@type": "Dataset",
        "name": "twitter.com vs x.com Popularity Dataset",
        "description": "A derived comparison dataset for twitter.com and x.com built from multiple third-party public sources. See the methodology page for source roles, licenses, and caveats.",
        "url": "https://didtwitterdie.com/",
        "creator": {
          "@type": "Person",
          "name": "Ege Kocabas"
        },
        "keywords": ["twitter", "x.com", "domain ranking", "web traffic", "social media", "Tranco", "Cloudflare Radar"],
        "temporalCoverage": "2022-09-01/..",
        "spatialCoverage": "Global"
      }
    ]
    </script>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://didtwitterdie.com/" />
    <meta property="og:title" content="Did Twitter Die?" />
    <meta property="og:description" content="Real data comparing twitter.com vs x.com popularity since the July 2023 rebrand." />
    <meta property="og:image" content="https://didtwitterdie.com/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Did Twitter Die?" />
    <meta name="twitter:description" content="Real data comparing twitter.com vs x.com popularity since the July 2023 rebrand." />
    <meta name="twitter:image" content="https://didtwitterdie.com/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <style>
        .noscript { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; }
        .noscript h1 { font-size: 3rem; font-weight: bold; }
        .noscript h2 { font-size: 1.5rem; font-weight: bold; margin-top: 2rem; }
        .noscript p { color: #6b7280; margin-top: 0.5rem; }
      </style>
      <div class="noscript">
        <h1>Did Twitter Die?</h1>
        <p>Tracking the slow death (or survival) of Twitter since the rebrand to X on July 24, 2023.</p>
        <p>This site uses real data to compare twitter.com vs x.com across DNS query popularity, global domain rankings, and Google search interest — updated daily.</p>
        <h2>Domain popularity over time</h2>
        <p>Historical Tranco global domain ranking of twitter.com vs x.com since the July 2023 rebrand. A lower rank number means more popular.</p>
        <h2>What people Google</h2>
        <p>Google Trends search interest for "twitter" vs "x.com" over time, showing whether people are still searching for Twitter by its original name.</p>
        <h2>The verdict</h2>
        <p>Based on aggregated DNS and web traffic signals from the Tranco List and Cloudflare Radar, a live verdict on whether Twitter is dead or still alive relative to X.</p>
        <p>Data sources: Cloudflare Radar, Tranco List (Cloudflare DNS, Cisco Umbrella, Chrome UX, Majestic, Farsight), Google Trends.</p>
        <p>Please enable JavaScript to view the interactive charts and live data.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
