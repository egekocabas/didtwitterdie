name = "didtwitterdie"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

[[kv_namespaces]]
binding = "CACHE"
id = "12d1ca23268245769547ba7b0ea1eedf"

# Cron trigger for daily data refresh (post-MVP)
# MVP approach: relies on KV TTL (24hr) + cache-miss fallback in /api/data.
# When the 24hr TTL expires, the next visitor triggers a live fetch and re-caches.
# Uncomment when creating a standalone cron Worker for guaranteed daily refresh:
# [triggers]
# crons = ["0 6 * * *"]
