version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 1
    ignore:
      # eslint-plugin-react@7.37.5 currently peers only through ESLint 9.x,
      # so major ESLint upgrades break npm resolution in CI.
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@eslint/js"
        update-types:
          - "version-update:semver-major"
    groups:
      all-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
