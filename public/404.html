<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="robots" content="noindex, follow" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <title>Page Not Found | Did Twitter Die?</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        background: #ffffff;
        color: #111827;
      }

      .card {
        width: min(100%, 42rem);
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 0.75rem;
        color: #6b7280;
        font-size: 0.875rem;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.5rem, 5vw, 4rem);
        line-height: 1;
      }

      p {
        margin: 1rem auto 0;
        max-width: 34rem;
        color: #4b5563;
        font-size: 1rem;
        line-height: 1.7;
      }

      .links {
        margin-top: 2rem;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 1rem;
      }

      a {
        color: inherit;
        font-weight: 600;
        text-underline-offset: 0.22em;
      }

      img {
        display: block;
        width: 5rem;
        height: 5rem;
        margin: 0 auto 1.5rem;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #030712;
          color: #f9fafb;
        }

        .eyebrow,
        p {
          color: #d1d5db;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img src="/icon.svg" alt="Upside-down Twitter bird with X eyes and blood drips" />
      <p class="eyebrow">404</p>
      <h1>Page not found</h1>
      <p>
        That URL does not exist on didtwitterdie.com. The main dashboard and the source pages are
        still available below.
      </p>
      <nav class="links" aria-label="Helpful links">
        <a href="/">Dashboard</a>
        <a href="/methodology">Sources &amp; methodology</a>
        <a href="/privacy">Privacy</a>
      </nav>
    </main>
  </body>
</html>
